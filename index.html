<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contador v8.2 (Sheets)</title>
  <style>
    :root {
      --bg-color: #f4f7f6;
      --card-bg: #ffffff;
      --primary: #007bff;
      --success: #28a745;
      --danger: #dc3545;
      --text: #333333;
      --qtd-colunas: 6; /* Padrão de 6 colunas na tela */
    }

    body {
      font-family: Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1300px; /* Aumentado para aproveitar melhor telas horizontais */
      margin: 0 auto;
      background: var(--card-bg);
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .screen { display: none; }
    .screen.active { display: block; }

    h1, h2, h3 { text-align: center; }

    .status-sync {
      text-align: center;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 15px;
      padding: 8px;
      border-radius: 5px;
      background: #eef2f5;
    }

    .debug-box {
      background: #1e1e1e;
      color: #00ff66;
      font-family: monospace;
      padding: 10px;
      border-radius: 5px;
      font-size: 12px;
      max-height: 150px;
      overflow-y: auto;
      margin-top: 15px;
      display: none;
    }

    .btn {
      padding: 10px 15px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }
    .btn-main { background: #e8fffd; border: 1px solid #17a2b8; width: 100%; padding: 15px; margin: 8px 0; font-size: 16px; }
    .btn-main:hover { background: #d1f7f4; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-success { background: var(--success); color: white; }
    .btn-secondary { background: #6c757d; color: white; }

    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }

    .grid-contadores {
      display: grid;
      grid-template-columns: repeat(var(--qtd-colunas), 1fr); /* Colunas dinâmicas */
      gap: 10px;
      margin: 20px 0;
    }

    .card-contador {
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px;
      text-align: center;
      background: #fafafa;
    }

    .card-contador .nome { font-size: 13px; font-weight: bold; height: 36px; overflow: hidden; }
    .card-contador .qtd { font-size: 20px; color: var(--primary); margin: 5px 0; }
    .btn-counter { width: 35px; height: 35px; font-size: 16px; margin: 0 2px; }

    .bottom-bar { display: flex; gap: 10px; margin-top: 15px; }
    .bottom-bar button { flex: 1; }

    #comprovante-print { display: none; }

    @media print {
      @page {
        size: auto;
        margin: 0mm 0mm 0mm 1mm;
      }

      body * { visibility: hidden; }
      #comprovante-print, #comprovante-print * { visibility: visible; }

      #comprovante-print {
        display: block !important;
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        max-width: 80mm;
        padding: 2mm 4mm;
        zoom: 170%;
        transform-origin: top left;
        font-family: 'Consolas', 'Courier New', Courier, monospace;
        font-size: 8pt;
        font-weight: 900;
        line-height: 1.15;
        color: #000000 !important;
        background: #ffffff;
        white-space: pre;
      }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- TELA INICIAL -->
  <div id="tela-inicio" class="screen active">
    <h1>Contador de Atendimentos</h1>
    <p style="text-align:center; color: #777;">Versão 8.2 WebServer (Developed by Gabriel Santos)</p>
    <div id="status-sync" class="status-sync">🔄 Carregando dados da nuvem...</div>
    
    <button class="btn btn-main" onclick="escolherTipo('consulta')">CONSULTA</button>
    <button class="btn btn-main" onclick="escolherTipo('sadt')">SADT</button>
    <button class="btn btn-secondary" style="width:100%; margin-top:10px;" onclick="sincronizarComPlanilha()">🔄 Atualizar Banco de Dados</button>
    
    <div id="debug-box" class="debug-box"></div>
  </div>

  <!-- TELA CONTADOR -->
  <div id="tela-contador" class="screen">
    <h2 id="titulo-tipo">Contador</h2>
    
    <!-- Controle de Quantidade de Colunas -->
    <div style="display: flex; justify-content: flex-end; align-items: center; gap: 8px; margin-bottom: 15px; background: #f8f9fa; padding: 8px 12px; border-radius: 6px; border: 1px solid #e2e8f0;">
      <span style="font-size: 13px; font-weight: bold; color: #555;">Colunas por linha:</span>
      <button class="btn btn-secondary" style="padding: 2px 10px; font-size: 16px;" onclick="alterarColunas(-1)">-</button>
      <span id="lbl-colunas" style="font-weight: bold; font-size: 14px; min-width: 20px; text-align: center;">6</span>
      <button class="btn btn-secondary" style="padding: 2px 10px; font-size: 16px;" onclick="alterarColunas(1)">+</button>
    </div>

    <div class="form-group">
      <label>Convênio:</label>
      <select id="select-convenio" onchange="selecionarConvenio()"></select>
    </div>

    <div class="form-group">
      <label>Lote:</label>
      <input type="text" id="input-lote" placeholder="Digite o número do lote">
    </div>

    <div id="grid-contadores" class="grid-contadores"></div>

    <div style="text-align: center; background: #eef2f5; padding: 10px; border-radius: 6px;">
      <h3 id="lbl-qtd" style="margin: 0;">Quantidade: 0</h3>
      <h3 id="lbl-valor" style="margin: 5px 0 0 0; color: var(--success);">Valor Total: R$ 0.00</h3>
    </div>

    <div class="bottom-bar">
      <button class="btn btn-danger" onclick="zerar()">Zerar</button>
      <button class="btn btn-primary" onclick="imprimirComprovante()">Imprimir</button>
      <button class="btn btn-success" onclick="salvarArquivoTXT()">Baixar TXT</button>
      <button class="btn btn-secondary" onclick="navegar('tela-inicio')">Voltar</button>
    </div>
  </div>

</div>

<div id="comprovante-print"></div>

<script>
  const URL_PROFISSIONAIS_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQRCSnS7sXbLE0_zzysCTqMOpKKP6x1U1P_ruWHK8hF3RGmOGcUYJK4DoMRYXQxlGjTR4uaeSes1c4u/pub?gid=0&single=true&output=csv";
  const URL_CONVENIOS_CSV     = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQRCSnS7sXbLE0_zzysCTqMOpKKP6x1U1P_ruWHK8hF3RGmOGcUYJK4DoMRYXQxlGjTR4uaeSes1c4u/pub?gid=2019437900&single=true&output=csv";

  let dados = {
    profissionais: { consulta: [], sadt: [] },
    convenios: { consulta: [], sadt: [] }
  };

  let tipoAtual = 'consulta';
  let valorAtual = 0.0;
  let contadores = {};

  // Controle de colunas dinâmico
  let colunasAtuais = parseInt(localStorage.getItem('pref_colunas')) || 6;

  function aplicarColunas(qtd) {
    colunasAtuais = Math.min(Math.max(qtd, 2), 12); // Limita entre 2 e 12 colunas
    document.documentElement.style.setProperty('--qtd-colunas', colunasAtuais);
    
    const lbl = document.getElementById('lbl-colunas');
    if (lbl) lbl.innerText = colunasAtuais;
    
    localStorage.setItem('pref_colunas', colunasAtuais);
  }

  function alterarColunas(delta) {
    aplicarColunas(colunasAtuais + delta);
  }

  function debugLog(txt) {
    const box = document.getElementById('debug-box');
    box.style.display = 'block';
    box.innerHTML += txt + "<br>";
  }

  function parseCSVLine(line) {
    const separator = line.includes(';') ? ';' : ',';
    const result = [];
    let start = 0;
    let inQuotes = false;

    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') {
        inQuotes = !inQuotes;
      } else if (line[i] === separator && !inQuotes) {
        let field = line.substring(start, i).trim();
        if (field.startsWith('"') && field.endsWith('"')) {
          field = field.substring(1, field.length - 1);
        }
        result.push(field);
        start = i + 1;
      }
    }
    let lastField = line.substring(start).trim();
    if (lastField.startsWith('"') && lastField.endsWith('"')) {
      lastField = lastField.substring(1, lastField.length - 1);
    }
    result.push(lastField);
    return result;
  }

  async function carregarCSVTexto(url) {
    const response = await fetch(url, { cache: "no-store" });
    if (!response.ok) throw new Error("Erro de rede ao buscar o CSV");
    const text = await response.text();
    const lines = text.split(/\r?\n/).filter(line => line.trim().length > 0);
    return lines.map(parseCSVLine);
  }

  async function sincronizarComPlanilha() {
    const statusEl = document.getElementById('status-sync');
    document.getElementById('debug-box').innerHTML = '';
    
    if (statusEl) {
      statusEl.innerText = "🔄 Sincronizando dados com o Google Sheets...";
      statusEl.style.color = "#333";
    }

    try {
      const [rowsProf, rowsConv] = await Promise.all([
        carregarCSVTexto(URL_PROFISSIONAIS_CSV),
        carregarCSVTexto(URL_CONVENIOS_CSV)
      ]);

      dados.profissionais = { consulta: [], sadt: [] };
      dados.convenios = { consulta: [], sadt: [] };

      debugLog(`${rowsProf.length} Profissionais Cadastrados`);

      // Processa Profissionais
      for (let i = 1; i < rowsProf.length; i++) {
        const row = rowsProf[i];
        if (row.length >= 2) {
          const nome = row[0].trim();
          const tipo = row[1].toLowerCase().trim();

          if (nome && tipo) {
            if (tipo.includes('consulta')) dados.profissionais.consulta.push(nome);
            else if (tipo.includes('sadt')) dados.profissionais.sadt.push(nome);
            else debugLog(`⚠️ Profissional '${nome}' ignorado. Tipo encontrado: '${tipo}'`);
          }
        }
      }

      debugLog(`${rowsConv.length} Convênios Localizados`);

      // Processa Convênios
      for (let i = 1; i < rowsConv.length; i++) {
        const row = rowsConv[i];
        if (row.length >= 3) {
          const nome = row[0].trim();
          const valorRaw = row[1].trim();
          const tipo = row[2].toLowerCase().trim();

          if (nome && tipo) {
            const valorClean = valorRaw.replace('R$', '').replace(/\s/g, '').replace('.', '').replace(',', '.');
            const valorFormatado = parseFloat(valorClean) || 0.0;
            const objConv = { nome: nome, valor: valorFormatado };

            if (tipo.includes('consulta')) dados.convenios.consulta.push(objConv);
            else if (tipo.includes('sadt')) dados.convenios.sadt.push(objConv);
            else debugLog(`⚠️ Convênio '${nome}' ignorado. Tipo encontrado: '${tipo}'`);
          }
        }
      }

      const totalProf = dados.profissionais.consulta.length + dados.profissionais.sadt.length;
      if (totalProf === 0) {
        throw new Error("Nenhum profissional válido foi importado.");
      }

      localStorage.setItem('dados_sheets_cache', JSON.stringify(dados));
      
      if (statusEl) {
        statusEl.innerText = "🟢 Dados sincronizados - Banco de Dados Atualizado";
        statusEl.style.color = "#28a745";
      }
    } catch (err) {
      console.error(err);
      debugLog(`❌ Erro: ${err.message}`);
      
      const cache = localStorage.getItem('dados_sheets_cache');
      if (cache) {
        dados = JSON.parse(cache);
        if (statusEl) {
          statusEl.innerText = "🟡 Conectado via cache local (Offline)";
          statusEl.style.color = "#856404";
        }
      } else {
        if (statusEl) {
          statusEl.innerText = "🔴 Falha no formato da planilha. Veja os detalhes abaixo:";
          statusEl.style.color = "#dc3545";
        }
      }
    }
  }

  function navegar(idTela) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(idTela).classList.add('active');
  }

  function escolherTipo(tipo) {
    tipoAtual = tipo;
    document.getElementById('titulo-tipo').innerText = `Contador - ${tipo.toUpperCase()}`;
    carregarDropdownConvenios();
    iniciarContadores();
    navegar('tela-contador');
  }

  function carregarDropdownConvenios() {
    const select = document.getElementById('select-convenio');
    select.innerHTML = '<option value="">Selecione um convênio</option>';
    const lista = dados.convenios[tipoAtual] || [];
    
    lista.forEach((c, index) => {
      const opt = document.createElement('option');
      opt.value = index;
      opt.textContent = `${c.nome} | R$ ${parseFloat(c.valor).toFixed(2)}`;
      select.appendChild(opt);
    });
    valorAtual = 0.0;
    atualizarTotais();
  }

  function selecionarConvenio() {
    const idx = document.getElementById('select-convenio').value;
    if (idx !== "") {
      valorAtual = parseFloat(dados.convenios[tipoAtual][idx].valor);
    } else {
      valorAtual = 0.0;
    }
    atualizarTotais();
  }

  function iniciarContadores() {
    const grid = document.getElementById('grid-contadores');
    grid.innerHTML = '';
    contadores = {};
    const nomes = dados.profissionais[tipoAtual] || [];

    nomes.forEach(nome => {
      contadores[nome] = 0;
      const card = document.createElement('div');
      card.className = 'card-contador';
      card.innerHTML = `
        <div class="nome">${nome}</div>
        <div class="qtd" id="qtd-${nome}">0</div>
        <div>
          <button class="btn btn-secondary btn-counter" onclick="alterarQtd('${nome}', -1)">-</button>
          <button class="btn btn-primary btn-counter" onclick="alterarQtd('${nome}', 1)">+</button>
        </div>
      `;
      grid.appendChild(card);
    });
    atualizarTotais();
  }

  function alterarQtd(nome, delta) {
    if (contadores[nome] + delta >= 0) {
      contadores[nome] += delta;
      document.getElementById(`qtd-${nome}`).innerText = contadores[nome];
      atualizarTotais();
    }
  }

  function atualizarTotais() {
    const qtdTotal = Object.values(contadores).reduce((a, b) => a + b, 0);
    const valorTotal = qtdTotal * valorAtual;
    document.getElementById('lbl-qtd').innerText = `Quantidade: ${qtdTotal}`;
    document.getElementById('lbl-valor').innerText = `Valor Total: R$ ${valorTotal.toFixed(2)}`;
  }

  function zerar() {
    for (let k in contadores) {
      contadores[k] = 0;
      const el = document.getElementById(`qtd-${k}`);
      if (el) el.innerText = "0";
    }
    document.getElementById('input-lote').value = '';
    atualizarTotais();
  }

  function gerarTextoComprovante() {
    const agora = new Date().toLocaleString('pt-BR');
    const lote = document.getElementById('input-lote').value.trim();
    const idxConv = document.getElementById('select-convenio').value;
    
    let linhas = [];
    linhas.push("≈RESUMO ATENDIMENTOS");
    linhas.push(`Data: ${agora}`);
    linhas.push(`Tipo: ${tipoAtual.toUpperCase()}`);
    if (lote) linhas.push(`Lote: ${lote}`);
    
    if (idxConv !== "") {
      const conv = dados.convenios[tipoAtual][idxConv];
      linhas.push(`Convênio: ${conv.nome}`);
      linhas.push(`Valor Un.: R$ ${valorAtual.toFixed(2)}`);
    }

    linhas.push("¯".repeat(29));
    linhas.push("Profissional   -   Quant.");

    let totalQtd = 0;
    for (const [nome, qtd] of Object.entries(contadores)) {
      if (qtd > 0) {
        let nomeCurto = nome.length > 20 ? nome.substring(0, 18) + '..' : nome.padEnd(20, ' ');
        linhas.push(`${nomeCurto} ${qtd}`);
        totalQtd += qtd;
      }
    }

    linhas.push("_".repeat(29));
    let totalValor = totalQtd * valorAtual;

    if (valorAtual > 0) {
      linhas.push(`Total: ${totalQtd} atendimentos`);
      linhas.push(`Valor Total: R$ ${totalValor.toFixed(2)}`);
    } else {
      linhas.push(`TOTAL: ${totalQtd} atendimentos`);
    }

    linhas.push("─".repeat(29));
    linhas.push("     ∙STATUS DO LOTE∙\n");
    linhas.push("►PLANILHA - ►DIGITALIZADO\n");
    linhas.push("►ENVIADO - ►ARQUIVADO\n");
    linhas.push("Ver 8.2 WebServer\n");
    linhas.push("Dev. GЪ - Since 02/2026");

    return linhas.join("\n");
  }

  function imprimirComprovante() {
    const texto = gerarTextoComprovante();
    document.getElementById('comprovante-print').innerText = texto;
    window.print();
  }

  function salvarArquivoTXT() {
    const texto = gerarTextoComprovante();
    const blob = new Blob([texto], { type: 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `comprovante_${new Date().getTime()}.txt`;
    a.click();
  }

  window.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && (e.key === 'p' || e.key === 'P')) {
      e.preventDefault();
      if (document.getElementById('tela-contador').classList.contains('active')) {
        imprimirComprovante();
      }
    }
  });

  // Aplica preferência de colunas ao iniciar
  aplicarColunas(colunasAtuais);

  sincronizarComPlanilha();
</script>

</body>
</html>
